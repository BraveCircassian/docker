services:
  headscale:
    image: docker.io/headscale/headscale:latest
    restart: unless-stopped
    environment:
      - HEADSCALE_CONFIG=/etc/headscale/config.yaml
    container_name: headscale
    read_only: true
    tmpfs:
      - /var/run/headscale
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config:/etc/headscale:ro
      - ./lib:/var/lib/headscale
    command: serve
    healthcheck:
        test: ["CMD", "headscale", "health"]